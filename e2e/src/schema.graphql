# TODO: strawberry doesn't generate these directives
directive @defer(
	if: Boolean
	label: String
) on FRAGMENT_SPREAD | INLINE_FRAGMENT
directive @stream(if: Boolean, label: String, initialCount: Int = 0) on FIELD

type Author {
	id: ID!
	name: String!
}

type BlogPost {
	id: ID!
	title: String!
	content: String!
	comments: [Comment!]!
}

type Comment {
	id: ID!
	content: String!
	author: Author!
}

type Mutation {
	echo(message: String!): String!
}

type Query {
	hello(delay: Float! = 0): String!
	blogPost(id: ID!): BlogPost!
	failing: String!
}

type Subscription {
	count(target: Int! = 3): Int!
	countThenFail(target: Int! = 2): Int!
}
