name: 🎭 E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "e2e/**"
      - ".github/workflows/e2e-tests.yml"

jobs:
  e2e-tests:
    name: 🎭 Run E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install dependencies
        run: |
          cd e2e
          bun install

      - name: Install Playwright browsers
        run: |
          cd e2e
          bunx playwright install --with-deps

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          uv sync --extra cli
          uv pip install graphql-core==3.3.0a9

      - name: Start Strawberry server
        run: |
          cd e2e
          # --no-sync prevents uv from reverting graphql-core to lockfile version
          uv run --no-sync strawberry dev app:schema --port 8000 &
          echo $! > server.pid
          sleep 5  # Wait for server to start

      - name: Check if server is running
        run: |
          curl -f http://localhost:8000/graphql || (echo "Server is not running" && exit 1)
          echo "GraphQL server is running successfully"

      - name: Run Playwright tests
        run: |
          cd e2e
          bunx playwright test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
