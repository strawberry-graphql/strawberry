name: 🆙 Release

concurrency: release

on:
  push:
    branches: [main]

permissions:
  id-token: write

jobs:
  check-release:
    name: Check for release
    runs-on: ubuntu-latest
    outputs:
      has_release: ${{ steps.check.outputs.has_release }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0

      - name: Check for release
        id: check
        run: |
          if uvx --from autopub==1.0.0a55 --with pygithub autopub check; then
            echo "has_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Verify .autopub directory
        if: steps.check.outputs.has_release == 'true'
        run: |
          if [ -d ".autopub" ]; then
            echo "Found .autopub directory"
          else
            echo "No .autopub directory found"
            exit 1
          fi

      - name: Upload .autopub artifact
        if: steps.check.outputs.has_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: autopub-data
          path: .autopub
          include-hidden-files: true

  publish:
    name: Publish to PyPI
    needs: check-release
    if: ${{ github.ref == 'refs/heads/main' && needs.check-release.outputs.has_release == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0

      - name: Download .autopub artifact
        uses: actions/download-artifact@v4
        with:
          name: autopub-data
          path: .autopub

      - name: Build and publish
        run: |
          echo "✨ Preparing..."
          uvx --from autopub==1.0.0a55 --with pygithub autopub prepare
          echo "✨ Building..."
          uvx --from autopub==1.0.0a55 --with pygithub autopub build
          echo "✨ Publishing..."
          uvx --from autopub==1.0.0a55 --with pygithub autopub publish
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
          GIT_USERNAME: botberry
          GIT_EMAIL: bot@strawberry.rocks
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
