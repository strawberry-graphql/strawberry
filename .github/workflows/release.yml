name: 🆙 Release

concurrency: release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  AUTOPUB_CMD: uvx --from autopub>=1.0.0a51 --with pygithub autopub

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      has_release: ${{ steps.check.outputs.has_release }}
      changelog: ${{ steps.release-info.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Check
        id: check
        run: |
          if $AUTOPUB_CMD check; then
            echo "has_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Extract release info
        id: release-info
        if: steps.check.outputs.has_release == 'true'
        run: |
          if [ -f "RELEASE.md" ]; then
            changelog=$(tail -n +2 RELEASE.md | base64 -w 0)
            echo "changelog=${changelog}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload .autopub artifact
        if: steps.check.outputs.has_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: autopub-data
          path: .autopub
          include-hidden-files: true

  publish:
    needs: check-release
    if: github.ref == 'refs/heads/main' && needs.check-release.outputs.has_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Download .autopub
        uses: actions/download-artifact@v4
        with:
          name: autopub-data
          path: .autopub

      - name: Build and publish
        run: |
          git remote set-url origin https://${{ secrets.BOT_TOKEN }}@github.com/${{ github.repository }}
          echo "✨ Preparing..."
          $AUTOPUB_CMD prepare
          echo "✨ Building..."
          $AUTOPUB_CMD build
          echo "✨ Publishing..."
          $AUTOPUB_CMD publish
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Get project version
        id: get-version
        shell: python
        run: |
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          version = data.get("project", {}).get("version", "unknown")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as f:
              f.write(f"version={version}\n")

  get-contributor-info:
    name: Get PR info
    runs-on: ubuntu-latest
    needs: check-release
    if: github.ref == 'refs/heads/main' && needs.check-release.outputs.has_release == 'true'

    outputs:
      contributor-name: ${{ steps.get-info.outputs.contributor-name }}
      contributor-username: ${{ steps.get-info.outputs.contributor-username }}
      contributor-twitter-username: ${{ steps.get-info.outputs.contributor-twitter-username }}
      pr-number: ${{ steps.get-info.outputs.pr-number }}

    steps:
      - name: Get PR info
        id: get-info
        uses: strawberry-graphql/get-pr-info-action@v6

  read-tweet-md:
    name: Read TWEET.md
    runs-on: ubuntu-latest
    needs: [publish, get-contributor-info, check-release]
    if: needs.get-contributor-info.outputs.contributor-name != ''

    outputs:
      tweet: ${{ steps.extract.outputs.tweet }}
      has-tweet-file: ${{ steps.extract.outputs.has-tweet-file }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract tweet message and changelog
        id: extract
        uses: strawberry-graphql/tweet-actions/read-tweet@v6
        with:
          changelog: ${{ needs.check-release.outputs.changelog }}
          version: ${{ needs.publish.outputs.version }}
          contributor_name: ${{ needs.get-contributor-info.outputs.contributor-name }}
          contributor_twitter_username: ${{ needs.get-contributor-info.outputs.contributor-twitter-username }}

  send-tweet:
    name: Send tweet
    runs-on: ubuntu-latest
    needs: [publish, read-tweet-md]

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system tweepy==4.14.0

      - name: Send tweet
        shell: python
        run: |
          import base64
          import os

          import tweepy

          TWITTER_CONSUMER_KEY = os.environ["TWITTER_API_KEY"]
          TWITTER_CONSUMER_SECRET = os.environ["TWITTER_API_SECRET"]
          TWITTER_ACCESS_TOKEN = os.environ["TWITTER_ACCESS_TOKEN"]
          TWITTER_ACCESS_TOKEN_SECRET = os.environ["TWITTER_ACCESS_TOKEN_SECRET"]
          TWITTER_BEARER_TOKEN = os.environ["TWITTER_BEARER_TOKEN"]


          tweepy_v2 = tweepy.Client(
              TWITTER_BEARER_TOKEN,
              consumer_key=TWITTER_CONSUMER_KEY,
              consumer_secret=TWITTER_CONSUMER_SECRET,
              access_token=TWITTER_ACCESS_TOKEN,
              access_token_secret=TWITTER_ACCESS_TOKEN_SECRET,
          )


          def post_tweet() -> None:
              text = base64.b64decode(os.environ["TWEET"]).decode("utf-8")
              tweepy_v2.create_tweet(text=text)


          post_tweet()
        env:
          TWEET: ${{ needs.read-tweet-md.outputs.tweet }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}

  remove-tweet-file:
    name: Remove TWEET.md
    if: always() && needs.read-tweet-md.outputs.has-tweet-file == 'true'
    needs: [send-tweet, read-tweet-md]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove TWEET.md and commit
        run: |
          git config --global user.name 'Strawberry GraphQL Bot'
          git config --global user.email 'bot@strawberry.rocks'
          git remote set-url origin https://${{ secrets.BOT_TOKEN }}@github.com/${{ github.repository }}
          git pull
          git rm TWEET.md
          git commit -m "Remove TWEET.md"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
